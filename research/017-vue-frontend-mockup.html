<!DOCTYPE html>
<html lang="en" class="p-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro-Up — Frontend Mockups</title>
  <link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css">
  <style>
    :root {
      --bg-base: #0b1121; --bg-surface: #111827; --bg-card: #1e293b; --bg-elevated: #0f172a;
      --border: #1e293b; --border-hover: #334155;
      --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b; --text-dim: #475569;
      --blue: #2563eb; --blue-hover: #1d4ed8; --blue-bg: #1e3a5f; --blue-text: #60a5fa;
      --green: #34d399; --green-bg: #064e3b;
      --yellow: #fbbf24; --yellow-text: #f59e0b; --yellow-bg: #451a03;
      --red: #ef4444; --red-bg: #7f1d1d;
      --purple: #a78bfa; --purple-bg: #4a1d96;
      --teal: #5eead4; --teal-bg: #134e4a;
      --radius: 8px; --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-secondary); min-height: 100vh; }
    a { color: var(--blue-text); text-decoration: none; }

    .app { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: var(--bg-elevated); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .sidebar-header .ver { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-secondary); font-size: 14px; transition: all .15s; user-select: none; }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active { background: var(--blue-bg); color: var(--blue-text); }
    .nav-item i { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge { margin-left: auto; background: var(--yellow-text); color: #000; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    .main { flex: 1; overflow-y: auto; }
    .page { display: none; padding: 24px 32px; max-width: 1200px; }
    .page.active { display: block; }
    .page-hdr h2 { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .page-hdr p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .page-hdr { margin-bottom: 24px; }

    .btn { padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-xs { padding: 3px 10px; font-size: 11px; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-warning { background: #d97706; color: #fff; }
    .btn-warning:hover { background: #b45309; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #059669; color: #fff; }
    .btn-outline { border-color: var(--border-hover); background: transparent; color: var(--text-secondary); }
    .btn-outline:hover { border-color: var(--blue-text); color: var(--blue-text); }
    .btn-ghost { border: none; background: transparent; color: var(--text-secondary); padding: 6px; cursor: pointer; }
    .icon-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border-hover); background: transparent; color: var(--text-secondary); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }
    .icon-btn:hover { border-color: var(--blue-text); color: var(--blue-text); }
    .icon-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-danger:hover { background: #dc2626; }

    .card { background: var(--bg-card); border: 1px solid var(--border-hover); border-radius: var(--radius-lg); }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: .3px; }
    .tag-capture { background: var(--blue-bg); color: var(--blue-text); }
    .tag-guiding { background: var(--green-bg); color: var(--green); }
    .tag-platesolving { background: var(--purple-bg); color: var(--purple); }
    .tag-driver { background: var(--yellow-bg); color: var(--yellow); }
    .tag-focusing { background: var(--red-bg); color: #fca5a5; }
    .tag-planetarium { background: var(--teal-bg); color: var(--teal); }
    .tag-prerequisites { background: #1a1a2e; color: #9ca3af; }
    .tag-usb { background: #1a1a2e; color: #9ca3af; }
    .tag-viewers { background: #1a1a2e; color: #9ca3af; }
    .tag-equipment { background: #1a1a2e; color: #9ca3af; }

    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .status-dot.installed { background: var(--green); }
    .status-dot.update { background: var(--yellow); }
    .status-dot.none { background: var(--text-dim); }

    .search-box { position: relative; }
    .search-box input { width: 100%; padding: 9px 12px 9px 34px; border-radius: var(--radius); border: 1px solid var(--border-hover); background: var(--bg-card); color: var(--text-primary); font-size: 13px; outline: none; }
    .search-box input:focus { border-color: var(--blue); }
    .search-box i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }

    .chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border-hover); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all .15s; user-select: none; }
    .chip:hover { border-color: var(--blue-text); color: var(--blue-text); }
    .chip.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text); }

    .toggle { width: 38px; height: 20px; border-radius: 10px; background: var(--border-hover); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: var(--blue); }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .2s; }
    .toggle.on::after { transform: translateX(18px); }

    .progress-bar { height: 5px; background: var(--border-hover); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .progress-fill.blue { background: var(--blue); }
    .progress-fill.green { background: var(--green); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border-hover); border-top-color: var(--blue-text); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }

    .ops-dock { position: fixed; bottom: 0; left: 220px; right: 0; background: var(--bg-elevated); border-top: 1px solid var(--border-hover); z-index: 50; }
    .ops-dock.hidden { display: none; }
    .ops-bar { display: flex; align-items: center; gap: 12px; padding: 10px 24px; }
    .ops-bar .label { font-size: 13px; color: var(--text-primary); flex: 1; }
    .ops-bar .pct { font-size: 12px; color: var(--text-muted); min-width: 36px; text-align: right; }
    .ops-bar .cancel { font-size: 11px; color: var(--red); cursor: pointer; margin-left: 8px; }

    /* Dashboard */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat { padding: 18px; }
    .stat .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat .val { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
    .stat .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .stat.warn .val { color: var(--yellow-text); }
    .stat.warn { cursor: pointer; }
    .upd-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .upd-row:last-child { border-bottom: none; }
    .upd-row:hover { background: rgba(255,255,255,.02); }
    .upd-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--blue-text); flex-shrink: 0; }
    .upd-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .upd-ver { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .upd-arrow { color: var(--yellow-text); font-size: 12px; }
    .quick-actions { display: flex; gap: 10px; margin-bottom: 24px; }
    .act-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .act-row:last-child { border-bottom: none; }
    .act-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .act-icon.install { background: var(--green-bg); color: var(--green); }
    .act-icon.update { background: var(--yellow-bg); color: var(--yellow); }
    .act-icon.scan { background: #1e1b4b; color: #818cf8; }
    .act-text .name { font-size: 13px; color: var(--text-primary); }
    .act-text .det { font-size: 11px; color: var(--text-muted); }
    .act-time { font-size: 11px; color: var(--text-dim); margin-left: auto; }

    /* Catalog */
    .catalog-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .sw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .sw-card { padding: 18px; cursor: pointer; transition: all .15s; }
    .sw-card:hover { border-color: var(--text-dim); transform: translateY(-1px); }
    .sw-card-hdr { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .sw-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--blue-text); flex-shrink: 0; }
    .sw-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .sw-pub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .sw-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sw-foot { display: flex; align-items: center; justify-content: space-between; }
    .sw-status { font-size: 11px; }

    /* Installed */
    .inst-group-hdr { padding: 10px 16px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .inst-group-hdr.warn { background: var(--yellow-bg); color: var(--yellow); }
    .inst-group-hdr.ok { background: var(--bg-elevated); color: var(--green); }
    .inst-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .inst-row:last-child { border-bottom: none; }
    .inst-row:hover { background: rgba(255,255,255,.02); }
    .inst-row .sw-icon { width: 38px; height: 38px; font-size: 15px; }
    .inst-info { flex: 1; min-width: 0; }
    .inst-name { font-size: 14px; color: var(--text-primary); font-weight: 500; }
    .inst-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .inst-version { font-size: 12px; min-width: 120px; text-align: right; margin-right: 8px; }
    .inst-actions { display: flex; gap: 6px; align-items: center; }

    /* Detail */
    .detail-hero { display: flex; gap: 24px; margin-bottom: 28px; }
    .detail-icon { width: 72px; height: 72px; border-radius: 14px; background: var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--blue-text); flex-shrink: 0; }
    .detail-name { font-size: 26px; font-weight: 700; color: var(--text-primary); }
    .detail-pub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .detail-desc { font-size: 13px; color: var(--text-secondary); margin-top: 8px; line-height: 1.6; }
    .detail-actions { display: flex; gap: 8px; margin-top: 14px; }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-hover); margin-bottom: 20px; }
    .tab { padding: 10px 18px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; user-select: none; }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--blue-text); border-bottom-color: var(--blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .info-item { background: var(--bg-card); padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); }
    .info-item .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .info-item .val { font-size: 13px; color: var(--text-primary); margin-top: 3px; }
    .ver-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .ver-table th { text-align: left; padding: 9px 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border-hover); }
    .ver-table td { padding: 10px 16px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid var(--border); }
    .ver-table tr:hover td { background: var(--bg-card); }
    .ver-current { background: rgba(37,99,235,.08); }
    .ver-badge { font-size: 10px; color: var(--green); background: var(--green-bg); padding: 2px 6px; border-radius: 4px; margin-left: 6px; text-transform: uppercase; font-weight: 600; }

    /* Backup */
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .form-group select, .form-group input[type="text"] { padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border-hover); background: var(--bg-card); color: var(--text-primary); font-size: 13px; outline: none; min-width: 200px; }
    .form-group select:focus { border-color: var(--blue); }
    .backup-list-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .backup-list-item:last-child { border-bottom: none; }
    .bk-icon { width: 38px; height: 38px; border-radius: 8px; background: var(--border-hover); display: flex; align-items: center; justify-content: center; color: var(--blue-text); font-size: 14px; flex-shrink: 0; }
    .bk-info { flex: 1; }
    .bk-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .bk-det { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Settings */
    .settings-layout { display: flex; gap: 24px; }
    .settings-nav { width: 180px; flex-shrink: 0; }
    .sn-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-bottom: 2px; user-select: none; }
    .sn-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .sn-item.active { background: var(--blue-bg); color: var(--blue-text); }
    .settings-section { padding: 20px; margin-bottom: 14px; }
    .settings-section h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; }
    .s-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); gap: 16px; }
    .s-row:last-child { border-bottom: none; }
    .s-label { font-size: 13px; color: var(--text-primary); }
    .s-hint { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .s-input input, .s-input select { padding: 7px 11px; border-radius: 6px; border: 1px solid var(--border-hover); background: var(--bg-elevated); color: var(--text-primary); font-size: 13px; outline: none; }

    @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } .info-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ==== DATA ====

];

const BACKUPS = [
  { pkg:'nina', ver:'3.1.2', files:12, size:'2.4 MB', date:'Today 12:30' },
  { pkg:'phd2', ver:'2.6.13', files:3, size:'48 KB', date:'Yesterday' },
  { pkg:'nina', ver:'3.1.1', files:11, size:'2.1 MB', date:'Mar 20' },
  { pkg:'ascom', ver:'6.6', files:1, size:'340 KB', date:'Mar 15' },
  { pkg:'nina', ver:'3.1.0', files:10, size:'1.9 MB', date:'Feb 28' },
];

const BACKUP_PACKAGES = [...new Set(BACKUPS.map(b => b.pkg))];

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.textContent; }
function getPkg(id) { return PACKAGES.find(p => p.id === id); }
function isUpdate(p) { return p.installed && p.installed !== p.latest; }
function getInstalled() { return PACKAGES.filter(p => p.installed); }
function getUpdatable() { return PACKAGES.filter(isUpdate); }
function pkgSearchText(p) { return [p.id, p.name, p.desc, p.pub, p.cat, p.method, p.license, p.deps].join(' ').toLowerCase(); }

// ==== GENERIC CONFIRM DIALOG ====
function showConfirmDialog({ title, icon, iconColor, message, detailHTML, confirmText, confirmClass, onConfirm }) {
  const existing = document.getElementById('confirm-overlay');
  if (existing) existing.remove();
  const ov = document.createElement('div');
  ov.id = 'confirm-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center';
  const dlg = document.createElement('div');
  dlg.style.cssText = 'background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:24px;width:500px;max-width:90vw;max-height:80vh;overflow-y:auto';
  const hdr = document.createElement('div'); hdr.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:16px';
  if (icon) { const ic = document.createElement('i'); ic.className = 'pi ' + icon; ic.style.cssText = 'font-size:18px;color:' + (iconColor || 'var(--blue-text)'); hdr.appendChild(ic); }
  const tt = document.createElement('span'); tt.style.cssText = 'font-size:16px;font-weight:600;color:var(--text-primary)'; tt.textContent = title; hdr.appendChild(tt);
  dlg.appendChild(hdr);
  if (message) { const msg = document.createElement('div'); msg.style.cssText = 'font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5'; msg.textContent = message; dlg.appendChild(msg); }
  if (detailHTML) { const det = document.createElement('div'); det.style.cssText = 'margin-bottom:16px'; det.innerHTML = detailHTML; dlg.appendChild(det); }
  const btns = document.createElement('div'); btns.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';
  const cancelBtn = document.createElement('button'); cancelBtn.className = 'btn btn-outline btn-sm'; cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => ov.remove());
  const okBtn = document.createElement('button'); okBtn.className = 'btn btn-sm ' + (confirmClass || 'btn-primary');
  okBtn.textContent = confirmText || 'Confirm';
  okBtn.addEventListener('click', () => { ov.remove(); if (onConfirm) onConfirm(); });
  btns.appendChild(cancelBtn); btns.appendChild(okBtn); dlg.appendChild(btns);
  ov.appendChild(dlg);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

function fileTableHTML(files, showAction) {
  const actionColor = { overwrite:'var(--yellow-text)', unchanged:'var(--text-muted)', new:'var(--green)' };
  const actionLabel = { overwrite:'Overwrite', unchanged:'Unchanged', new:'New' };
  const thStyle = 'text-align:left;padding:6px 10px;font-size:10px;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid var(--border-hover)';
  const tdStyle = 'font-size:11px;padding:6px 10px;border-bottom:1px solid var(--border)';
  let headers = showAction
    ? `<th style="${thStyle}">File</th><th style="${thStyle}">Action</th><th style="${thStyle}">Current</th><th style="${thStyle}">Backup</th>`
    : `<th style="${thStyle}">File</th><th style="${thStyle}">Size</th><th style="${thStyle}">Modified</th>`;
  let rows = files.map(f => {
    if (showAction) {
      const cur = f.curSize ? `${esc(f.curSize)}, ${esc(f.curDate)}` : '\u2014';
      return `<tr><td style="${tdStyle};font-family:monospace;color:var(--text-primary)">${esc(f.name)}</td><td style="${tdStyle};color:${actionColor[f.action]}">${actionLabel[f.action]}</td><td style="${tdStyle};color:var(--text-secondary)">${cur}</td><td style="${tdStyle};color:var(--text-secondary)">${esc(f.bkSize)}, ${esc(f.bkDate)}</td></tr>`;
    } else {
      return `<tr><td style="${tdStyle};font-family:monospace;color:var(--text-primary)">${esc(f.name)}</td><td style="${tdStyle};color:var(--text-secondary)">${esc(f.bkSize)}</td><td style="${tdStyle};color:var(--text-secondary)">${esc(f.bkDate)}</td></tr>`;
    }
  }).join('');
  return `<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderCatalog() {
  const page = document.createElement('div');
  page.className = 'page active';

  const cats = ['All','Capture','Guiding','Platesolving','Focusing','Planetarium','Viewers','Drivers','Prerequisites','USB','Equipment'];
  const chipsHTML = cats.map((c,i) => `<div class="chip ${i===0?'active':''}" data-filter="${esc(c)}">${esc(c)}</div>`).join('');

  page.appendChild(createFromHTML(`<div>
    <div class="page-hdr"><h2>Software Catalog</h2><p>Browse and install astrophotography software</p></div>
    <div class="catalog-bar">
      <div class="search-box" style="flex:1"><i class="pi pi-search"></i><input placeholder="Search packages..." id="catalog-search"></div>
      <div style="display:flex;gap:2px;background:var(--bg-card);border-radius:var(--radius);padding:2px">
        <button class="btn-ghost" style="border-radius:6px;background:var(--border-hover);color:var(--text-primary)"><i class="pi pi-th-large"></i></button>
        <button class="btn-ghost" style="border-radius:6px"><i class="pi pi-list"></i></button>
      </div>
    </div>
    <div class="filter-row" id="filter-row">${chipsHTML}</div>
    <div class="sw-grid" id="catalog-grid"></div>
  </div>`));

  let catalogFilter = 'all';
  const searchInput = page.querySelector('#catalog-search');

  function applyCatalogFilters() {
    const q = searchInput.value.toLowerCase();
    const f = catalogFilter;
    let filtered = f === 'all' ? PACKAGES :
      f === 'drivers' ? PACKAGES.filter(p => p.cat === 'driver') :
      PACKAGES.filter(p => p.cat === f);
    if (q) filtered = filtered.filter(p => pkgSearchText(p).includes(q));
    renderCatalogGrid(page.querySelector('#catalog-grid'), filtered);
  }

  applyCatalogFilters();

  page.querySelectorAll('.chip[data-filter]').forEach(chip => {
    chip.addEventListener('click', () => {
      page.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      catalogFilter = chip.dataset.filter.toLowerCase();
      applyCatalogFilters();
    });
  });

  searchInput.addEventListener('input', applyCatalogFilters);

  return page;
}

function renderCatalogGrid(container, packages) {
  container.textContent = '';
  packages.forEach(pkg => {
    let statusHTML;
    if (isUpdate(pkg)) statusHTML = `<span class="status-dot update"></span><span style="color:var(--yellow-text)">${esc(pkg.installed)} &rarr; ${esc(pkg.latest)}</span>`;
    else if (pkg.installed) statusHTML = `<span class="status-dot installed"></span><span style="color:var(--green)">${esc(pkg.installed)}</span>`;
    else statusHTML = `<span class="status-dot none"></span><span style="color:var(--text-dim)">Not installed</span>`;

    const card = createFromHTML(`<div class="sw-card card" data-detail="${esc(pkg.id)}">
      <div class="sw-card-hdr">
        <div class="sw-icon" ${pkg.cat==='driver'||pkg.cat==='usb'?'style="color:var(--yellow)"':''}><i class="pi ${esc(pkg.icon)}"></i></div>
        <div><div class="sw-name">${esc(pkg.name)}</div><div class="sw-pub">${esc(pkg.pub)}</div></div>
      </div>
      <div class="sw-desc">${esc(pkg.desc)}</div>
      <div class="sw-foot">
        <span class="tag tag-${esc(pkg.cat)}">${esc(pkg.cat)}</span>
        <div class="sw-status">${statusHTML}</div>
      </div>
    </div>`);
    card.addEventListener('click', () => { backFromPage = 'catalog'; goDetail(pkg.id); });
    container.appendChild(card);
  });
}

function renderBackup() {
  const page = document.createElement('div');
  page.className = 'page active';

  const pkgOptions = BACKUP_PACKAGES.map(id => {
    const p = getPkg(id);
    return `<option value="${esc(id)}">${esc(p.name)}</option>`;
  }).join('');

  const firstPkgBackups = BACKUPS.filter(b => b.pkg === BACKUP_PACKAGES[0]);
  const backupOptions = firstPkgBackups.map((b,i) => `<option value="${i}">v${esc(b.ver)} \u2014 ${esc(b.date)} (${b.files} files, ${esc(b.size)})</option>`).join('');

  function buildBackupList(filterPkg) {
    const filtered = filterPkg === 'all' ? BACKUPS : BACKUPS.filter(b => b.pkg === filterPkg);
    // Group by package
    const groups = {};
    filtered.forEach((b, origIdx) => {
      if (!groups[b.pkg]) groups[b.pkg] = [];
      groups[b.pkg].push({ ...b, idx: BACKUPS.indexOf(b) });
    });
    let html = '';
    for (const [pkgId, items] of Object.entries(groups)) {
      const p = getPkg(pkgId);
      html += `<div style="padding:10px 16px;background:var(--bg-elevated);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <div class="bk-icon" style="width:28px;height:28px;font-size:12px" ${p.cat==='driver'||p.cat==='usb'?'style="color:var(--yellow)"':''}><i class="pi ${esc(p.icon)}"></i></div>
        <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(p.name)}</span>
        <span style="font-size:11px;color:var(--text-muted)">${items.length} backup${items.length>1?'s':''}</span>
      </div>`;
      items.forEach(b => {
        html += `<div class="backup-list-item" style="padding-left:56px">
          <div class="bk-info"><div class="bk-name">v${esc(b.ver)}</div><div class="bk-det">${b.files} files &middot; ${esc(b.size)} &middot; ${esc(b.date)}</div></div>
          <div style="display:flex;gap:6px">
            <button class="icon-btn preview-backup-btn" data-bk-idx="${b.idx}" title="Preview contents"><i class="pi pi-eye"></i></button>
            <button class="icon-btn danger delete-backup-btn" data-bk-idx="${b.idx}" title="Delete"><i class="pi pi-trash"></i></button>
          </div>
        </div>`;
      });
    }
    return html;
  }

  const allPkgFilterOptions = '<option value="all">All Applications</option>' + BACKUP_PACKAGES.map(id => { const p = getPkg(id); return `<option value="${esc(id)}">${esc(p.name)}</option>`; }).join('');

  page.appendChild(createFromHTML(`<div>
    <div class="page-hdr"><h2>Backup & Restore</h2><p>Protect your astrophotography software configurations</p></div>

    <div class="section-title">Quick Restore</div>
    <div class="card" style="padding:20px;margin-bottom:24px">
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group">
          <label>Application</label>
          <select id="restore-pkg">${pkgOptions}</select>
        </div>
        <div class="form-group">
          <label>Backup</label>
          <select id="restore-ver">${backupOptions}</select>
        </div>
        <button class="btn btn-success" id="restore-preview-btn"><i class="pi pi-replay"></i> Preview & Restore</button>
      </div>
      <div id="restore-preview" style="margin-top:16px;display:none">
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Restore Preview</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-size:12px;margin-bottom:12px">
            <div><span style="color:var(--yellow-text);font-weight:600">3</span> <span style="color:var(--text-muted)">overwritten</span></div>
            <div><span style="color:var(--green);font-weight:600">2</span> <span style="color:var(--text-muted)">new</span></div>
            <div><span style="color:var(--text-secondary);font-weight:600">7</span> <span style="color:var(--text-muted)">unchanged</span></div>
          </div>
          ${fileTableHTML(MOCK_FILES, true)}
          <div style="margin-top:12px;display:flex;gap:8px">
            <button class="btn btn-danger btn-sm confirm-restore-btn"><i class="pi pi-check"></i> Confirm Restore</button>
            <button class="btn btn-outline btn-sm" id="restore-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">All Backups</div>
      <div class="form-group" style="min-width:180px">
        <select id="backup-filter">${allPkgFilterOptions}</select>
      </div>
    </div>
    <div class="card" style="overflow:hidden" id="backup-list-container">${buildBackupList('all')}</div>
  </div>`));

  // Restore preview toggle
  page.querySelector('#restore-preview-btn').addEventListener('click', () => {
    page.querySelector('#restore-preview').style.display = '';
  });
  page.querySelector('#restore-cancel').addEventListener('click', () => {
    page.querySelector('#restore-preview').style.display = 'none';
  });

  // Update backup dropdown when package changes
  page.querySelector('#restore-pkg').addEventListener('change', e => {
    const sel = page.querySelector('#restore-ver');
    sel.textContent = '';
    BACKUPS.filter(b => b.pkg === e.target.value).forEach((b,i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `v${b.ver} \u2014 ${b.date} (${b.files} files, ${b.size})`;
      sel.appendChild(opt);
    });
    page.querySelector('#restore-preview').style.display = 'none';
  });

  // Backup list filter
  page.querySelector('#backup-filter').addEventListener('change', e => {
    page.querySelector('#backup-list-container').innerHTML = buildBackupList(e.target.value);
  });

  return page;
}

function renderOpsDock() {
  const dock = document.createElement('div');
  dock.className = 'ops-dock hidden';
  dock.id = 'ops-dock';
  dock.appendChild(createFromHTML(`<div class="ops-bar">
    <div class="spinner"></div>
    <div class="label" id="ops-label"></div>
    <div class="progress-bar" style="flex:1;max-width:180px"><div class="progress-fill blue" id="ops-fill" style="width:0%"></div></div>
    <div class="pct" id="ops-pct">0%</div>
    <div class="cancel" id="ops-cancel">Cancel</div>
  </div>`));
  dock.querySelector('#ops-cancel').addEventListener('click', hideOps);
  return dock;
}

// ==== NAVIGATION (single document-level handler) ====
function bindNav() {}  // no-op, handled by global handler below

document.addEventListener('click', function(e) {
  // 1. Backup now buttons
  const backupBtn = e.target.closest('.backup-now-btn');
  if (backupBtn) { e.stopImmediatePropagation(); e.preventDefault(); const pkg = getPkg(backupBtn.getAttribute('data-pkg-id')); if (pkg) showBackupConfirm(pkg); return; }

  // 2. Update individual package (with confirm)
  const updBtn = e.target.closest('.update-pkg-btn');
  if (updBtn) { e.stopPropagation(); const pkg = getPkg(updBtn.getAttribute('data-pkg-id')); if (pkg) showUpdateConfirm(pkg); return; }

  // 3. Scan / Update All
  if (e.target.closest('.scan-btn')) { e.stopPropagation(); showScanConfirm(); return; }
  if (e.target.closest('.update-all-btn')) { e.stopPropagation(); showUpdateAllConfirm(); return; }

  // 4. Backup list actions
  const previewBtn = e.target.closest('.preview-backup-btn');
  if (previewBtn) { e.stopPropagation(); showPreviewContents(BACKUPS[parseInt(previewBtn.getAttribute('data-bk-idx'))]); return; }
  const deleteBtn = e.target.closest('.delete-backup-btn');
  if (deleteBtn) { e.stopPropagation(); showDeleteBackupConfirm(BACKUPS[parseInt(deleteBtn.getAttribute('data-bk-idx'))]); return; }

  // 5. Confirm restore (in restore preview — already seen files, just "are you sure")
  if (e.target.closest('.confirm-restore-btn')) { e.stopPropagation(); showRestoreFinalConfirm(BACKUPS[0]); return; }

  // 6. Settings actions
  if (e.target.closest('.check-updates-btn')) { e.stopPropagation(); showCheckAppUpdate(); return; }
  if (e.target.closest('.reset-defaults-btn')) { e.stopPropagation(); showResetDefaultsConfirm(); return; }

  // 7. Operation buttons (install from detail, backup-now from detail tab)
  const opBtn = e.target.closest('[data-op]');
  if (opBtn) { e.stopPropagation(); startOp(opBtn.dataset.op); return; }

  // 8. Skip row navigation if clicking any button
  if (e.target.closest('.btn, .icon-btn')) {
    const navBtn = e.target.closest('[data-nav]');
    if (navBtn) { currentPage = navBtn.dataset.nav; render(); }
    return;
  }

  // 9. Detail row navigation
  const detailRow = e.target.closest('[data-detail]');
  if (detailRow) { goDetail(detailRow.dataset.detail); return; }

  // 10. Page navigation
  const navEl = e.target.closest('[data-nav]');
  if (navEl) { currentPage = navEl.dataset.nav; render(); return; }
});

let detailInitTab = null;

function showBackupConfirm(pkg) {
  // Remove any existing dialog
  const existing = document.getElementById('backup-confirm-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'backup-confirm-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center';

  const dialog = document.createElement('div');
  dialog.style.cssText = 'background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:24px;width:420px;max-width:90vw';

  const title = document.createElement('div');
  title.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:16px';
  title.textContent = '';
  const icon = document.createElement('i');
  icon.className = 'pi pi-database';
  icon.style.cssText = 'color:var(--blue-text);font-size:18px';
  const titleText = document.createElement('span');
  titleText.style.cssText = 'font-size:16px;font-weight:600;color:var(--text-primary)';
  titleText.textContent = 'Backup ' + pkg.name;
  title.appendChild(icon);
  title.appendChild(titleText);

  const desc = document.createElement('div');
  desc.style.cssText = 'font-size:12px;color:var(--text-muted);margin-bottom:12px';
  desc.textContent = 'The following paths will be backed up:';

  const pathBox = document.createElement('div');
  pathBox.style.cssText = 'background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:16px';
  const pathText = document.createElement('div');
  pathText.style.cssText = 'font-family:monospace;font-size:12px;color:var(--text-primary);line-height:1.8';
  pathText.textContent = pkg.backupPaths;
  pathBox.appendChild(pathText);

  const meta = document.createElement('div');
  meta.style.cssText = 'font-size:11px;color:var(--text-muted);margin-bottom:16px';
  meta.textContent = 'Version: ' + (pkg.installed || pkg.latest);

  const buttons = document.createElement('div');
  buttons.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-outline btn-sm';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => overlay.remove());

  const proceedBtn = document.createElement('button');
  proceedBtn.className = 'btn btn-primary btn-sm';
  proceedBtn.style.cssText = 'display:flex;align-items:center;gap:6px';
  const proceedIcon = document.createElement('i');
  proceedIcon.className = 'pi pi-database';
  proceedBtn.appendChild(proceedIcon);
  const proceedText = document.createTextNode(' Proceed');
  proceedBtn.appendChild(proceedText);
  proceedBtn.addEventListener('click', () => {
    overlay.remove();
    startOp('Backing up ' + pkg.name + ' config');
  });

  buttons.appendChild(cancelBtn);
  buttons.appendChild(proceedBtn);

  dialog.appendChild(title);
  dialog.appendChild(desc);
  dialog.appendChild(pathBox);
  dialog.appendChild(meta);
  dialog.appendChild(buttons);
  overlay.appendChild(dialog);

  // Close on overlay click
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  document.body.appendChild(overlay);
}

function goDetail(id) {
  detailPkg = getPkg(id);
  detailInitTab = null;
  currentPage = 'detail';
  render();
}

function goDetailTab(id, tab) {
  detailPkg = getPkg(id);
  detailInitTab = tab;
  currentPage = 'detail';
  render();
}

// ==== OPERATIONS DOCK ====
let opsInterval;
function startOp(label) {
  const dock = document.getElementById('ops-dock');
  dock.classList.remove('hidden');
  document.getElementById('ops-label').textContent = label;
  document.getElementById('ops-fill').style.width = '0%';
  document.getElementById('ops-fill').className = 'progress-fill blue';
  document.getElementById('ops-pct').textContent = '0%';
  let pct = 0;
  clearInterval(opsInterval);
  opsInterval = setInterval(() => {
    pct += Math.random() * 4 + 1;
    if (pct >= 100) {
      pct = 100; clearInterval(opsInterval);
      document.getElementById('ops-fill').className = 'progress-fill green';
      document.getElementById('ops-label').textContent = label.replace('...', '') + ' \u2014 Complete!';
      setTimeout(hideOps, 2000);
    }
    document.getElementById('ops-fill').style.width = pct + '%';
    document.getElementById('ops-pct').textContent = Math.round(pct) + '%';
  }, 200);
}
function hideOps() {
  clearInterval(opsInterval);
  document.getElementById('ops-dock').classList.add('hidden');
}

// Expose to inline handlers
window.showBackupConfirm = showBackupConfirm;
window.getPkg = getPkg;
window.startOp = startOp;

// ==== INIT ====
render();
</script>
