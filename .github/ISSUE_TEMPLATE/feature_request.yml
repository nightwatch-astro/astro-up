name: Feature Request
description: Suggest a new feature or improvement for Astro-Up
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
      placeholder: Describe the feature or improvement you'd like
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve for your imaging workflow?
      placeholder: Describe how you would use this feature

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Astro-Up does this relate to?
      options:
        - Catalog (new package request)
        - Detection (finding installed software)
        - Install / Update
        - Backup / Restore
        - GUI
        - CLI
        - Configuration
        - Other

  - type: textarea
    id: package-icon
    attributes:
      label: Package icon (for catalog requests)
      description: |
        If requesting a new package, please provide a 128x128 PNG icon with transparent background.
        Attach the file to this issue, or link to the software's official icon.
        Icons are required for all catalog entries — they appear in the GUI catalog and detail views.
      placeholder: Attach icon or provide URL to official icon

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps explain the request
