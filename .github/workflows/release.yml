name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['crates/astro-up-cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: astro-up.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p astro-up-cli

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          ARTIFACT="target/${TARGET}/release/${{ matrix.artifact }}"
          EXT="${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}"
          UPLOAD_NAME="astro-up${EXT}"
          cp "${ARTIFACT}" "${UPLOAD_NAME}"
          gh release upload "${TAG}" "${UPLOAD_NAME}" --clobber

  build-installer:
    name: Build Windows Installer
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/astro-up-gui
          tauriScript: pnpm tauri
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: ${{ needs.release-please.outputs.tag_name }}
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish-release:
    name: Publish Release
    needs: [release-please, build-cli, build-installer]
    if: always() && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish or cleanup draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          CLI_RESULT: ${{ needs.build-cli.result }}
          INSTALLER_RESULT: ${{ needs.build-installer.result }}
        run: |
          if [ "${CLI_RESULT}" = "success" ] && [ "${INSTALLER_RESULT}" = "success" ]; then
            gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
            echo "Published release ${TAG}"
          else
            echo "Build failed (cli=${CLI_RESULT}, installer=${INSTALLER_RESULT}) — deleting draft release ${TAG}"
            gh release delete "${TAG}" --repo "${{ github.repository }}" --yes
            gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${TAG}" || true
            echo "Cleaned up draft release and tag"
            exit 1
          fi
