name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_notes: ${{ steps.notes.outputs.combined }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify manifest tag exists
        id: tag-check
        shell: bash
        run: |
          VERSION=$(jq -r '.["."]//"0.0.0"' .release-please-manifest.json)
          TAG="v${VERSION}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} exists — release-please can proceed safely"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag ${TAG} not found — this run may have been triggered before the previous release completed. Waiting 30s for tag propagation..."
            sleep 30
            git fetch --tags
            if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "tag_exists=true" >> "$GITHUB_OUTPUT"
              echo "Tag ${TAG} found after wait"
            else
              echo "::warning::Tag ${TAG} still not found after wait — release-please may generate incorrect changelog"
            fi
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract release notes
        id: notes
        if: steps.release.outputs.releases_created == 'true'
        env:
          BODY: ${{ steps.release.outputs.body }}
        shell: bash
        run: |
          {
            echo "combined<<NOTES_EOF"
            echo "${BODY}"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows (CLI + Installer)
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-msvc -p astro-up-cli

      - name: Upload standalone CLI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          cp "target/x86_64-pc-windows-msvc/release/astro-up-cli.exe" "astro-up-cli.exe"
          gh release upload "${TAG}" "astro-up-cli.exe" --clobber

      - name: Place CLI as sidecar for Tauri bundling
        shell: bash
        run: |
          mkdir -p crates/astro-up-gui/binaries
          cp target/x86_64-pc-windows-msvc/release/astro-up-cli.exe \
             crates/astro-up-gui/binaries/astro-up-cli-x86_64-pc-windows-msvc.exe

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --version ^2 --no-confirm

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/astro-up-gui
          tauriScript: cargo tauri
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: ${{ needs.release-please.outputs.tag_name }}
          releaseBody: ${{ needs.release-please.outputs.release_notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish-release:
    name: Publish Release
    needs: [release-please, build]
    if: always() && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish or cleanup draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "${BUILD_RESULT}" = "success" ]; then
            gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
            echo "Published release ${TAG}"
          else
            echo "Build failed (${BUILD_RESULT}) — deleting draft release ${TAG}"
            gh release delete "${TAG}" --repo "${{ github.repository }}" --yes
            gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${TAG}" || true
            echo "Cleaned up draft release and tag"
            exit 1
          fi
