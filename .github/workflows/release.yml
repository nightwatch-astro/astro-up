name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_notes: ${{ steps.notes.outputs.combined }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.NIGHTWATCH_APP_ID }}
          private-key: ${{ secrets.NIGHTWATCH_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract release notes
        id: notes
        if: steps.release.outputs.releases_created == 'true'
        env:
          BODY: ${{ steps.release.outputs.body }}
        shell: bash
        run: |
          {
            echo "combined<<NOTES_EOF"
            echo "${BODY}"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows (CLI + Installer)
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-msvc -p astro-up-cli

      - name: Upload standalone CLI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          cp "target/x86_64-pc-windows-msvc/release/astro-up-cli.exe" "astro-up-cli.exe"
          gh release upload "${TAG}" "astro-up-cli.exe" --clobber

      - name: Place CLI as sidecar for Tauri bundling
        shell: bash
        run: |
          mkdir -p crates/astro-up-gui/binaries
          cp target/x86_64-pc-windows-msvc/release/astro-up-cli.exe \
             crates/astro-up-gui/binaries/astro-up-cli-x86_64-pc-windows-msvc.exe

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/astro-up-gui
          tauriScript: cargo tauri
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: ${{ needs.release-please.outputs.tag_name }}
          releaseBody: ${{ needs.release-please.outputs.release_notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish-release:
    name: Publish Release
    needs: [release-please, build]
    if: always() && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish or cleanup draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "${BUILD_RESULT}" = "success" ]; then
            gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
            echo "Published release ${TAG}"
          else
            echo "Build failed (${BUILD_RESULT}) — deleting draft release ${TAG}"
            gh release delete "${TAG}" --repo "${{ github.repository }}" --yes
            gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${TAG}" || true
            echo "Cleaned up draft release and tag"
            exit 1
          fi
