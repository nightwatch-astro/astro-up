name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.NIGHTWATCH_APP_ID }}
          private-key: ${{ secrets.NIGHTWATCH_APP_PRIVATE_KEY }}

      - name: Run release-plz release-pr
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.release-plz.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.NIGHTWATCH_APP_ID }}
          private-key: ${{ secrets.NIGHTWATCH_APP_PRIVATE_KEY }}

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: astro-up.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p astro-up-cli

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          TAG=$(gh release list --limit 1 --json tagName,isDraft --jq '[.[] | select(.isDraft)] | .[0].tagName')
          ARTIFACT="target/${TARGET}/release/${{ matrix.artifact }}"
          EXT="${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}"
          UPLOAD_NAME="astro-up${EXT}"
          cp "${ARTIFACT}" "${UPLOAD_NAME}"
          gh release upload "${TAG}" "${UPLOAD_NAME}" --clobber

  build-installer:
    name: Build Windows Installer
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/astro-up-gui
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish-release:
    name: Publish Release
    needs: [release, build-cli, build-installer]
    if: always() && needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish or cleanup draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_RESULT: ${{ needs.build-cli.result }}
          INSTALLER_RESULT: ${{ needs.build-installer.result }}
        run: |
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 5 --json tagName,isDraft --jq '[.[] | select(.isDraft)] | .[0].tagName // empty')
          if [ -z "${TAG}" ]; then
            echo "No draft release found"
            exit 0
          fi

          if [ "${CLI_RESULT}" = "success" ] && [ "${INSTALLER_RESULT}" = "success" ]; then
            gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
            echo "Published release ${TAG}"
          else
            echo "Build failed (cli=${CLI_RESULT}, installer=${INSTALLER_RESULT}) — deleting draft release ${TAG}"
            gh release delete "${TAG}" --repo "${{ github.repository }}" --yes
            gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${TAG}" || true
            echo "Cleaned up draft release and tag"
            exit 1
          fi
