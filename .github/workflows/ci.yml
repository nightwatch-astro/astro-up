name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.filter.outputs.crates }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            crates:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'

  # Fast path: core + cli on Linux (~30s). Catches fmt, clippy, and
  # cross-platform unit tests without waiting for a Windows runner.
  check-rust:
    name: Rust Checks
    needs: changes
    if: needs.changes.outputs.crates == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p astro-up-core -p astro-up-cli --all-targets -- -D warnings
      - run: cargo nextest run -p astro-up-core -p astro-up-cli

  check-frontend:
    name: Frontend Checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --dir frontend build

  # Windows unit tests — clippy + fast tests, no fixtures needed.
  # Runs in parallel with integration tests.
  check-windows-unit:
    name: Windows Unit Tests
    needs: changes
    if: needs.changes.outputs.crates == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - name: Create dummy sidecar for Tauri build.rs validation
        shell: bash
        run: |
          mkdir -p crates/astro-up-gui/binaries
          touch crates/astro-up-gui/binaries/astro-up-cli-x86_64-pc-windows-msvc.exe
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run unit tests
        run: cargo nextest run --workspace --lib --bins --exclude astro-up

  # Windows integration tests — spawns the binary, needs catalog fixture.
  # Runs in parallel with unit tests on a separate runner.
  check-windows-integration:
    name: Windows Integration Tests
    needs: changes
    if: needs.changes.outputs.crates == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - name: Create dummy sidecar for Tauri build.rs validation
        shell: bash
        run: |
          mkdir -p crates/astro-up-gui/binaries
          touch crates/astro-up-gui/binaries/astro-up-cli-x86_64-pc-windows-msvc.exe
      - name: Build test fixture catalog
        shell: bash
        run: |
          choco install sqlite -y --no-progress
          sqlite3 crates/astro-up-cli/tests/fixtures/test-catalog.db < crates/astro-up-cli/tests/fixtures/build_catalog.sql
      - name: Run integration tests
        run: cargo nextest run --workspace --test '*' --exclude astro-up

  # Gate job: always runs, reports single required status.
  # Branch protection should require only "CI OK" — skipped jobs pass through.
  ci-ok:
    name: CI OK
    if: always()
    needs: [check-rust, check-frontend, check-windows-unit, check-windows-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        env:
          RUST: ${{ needs.check-rust.result }}
          FRONTEND: ${{ needs.check-frontend.result }}
          WIN_UNIT: ${{ needs.check-windows-unit.result }}
          WIN_INTEGRATION: ${{ needs.check-windows-integration.result }}
        run: |
          for result in "$RUST" "$FRONTEND" "$WIN_UNIT" "$WIN_INTEGRATION"; do
            if [ "$result" = "failure" ]; then
              echo "Job failed: $result"
              exit 1
            fi
          done
          echo "All checks passed, were skipped, or were cancelled by concurrency"
