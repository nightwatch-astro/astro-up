name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gui: ${{ steps.filter.outputs.gui }}
      crates: ${{ steps.filter.outputs.crates }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            gui:
              - 'crates/astro-up-gui/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            crates:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # Fast path: core + cli only (~30s). Runs on every PR.
  check-rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p astro-up-core -p astro-up-cli -- -D warnings
      - run: cargo test -p astro-up-core -p astro-up-cli

  # Slow path: gui crate needs Tauri system deps (~3min cached).
  # Only when gui crate or workspace Cargo files change.
  check-gui:
    name: Tauri GUI Check
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.gui == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy -p astro-up-gui -- -D warnings
      - run: cargo test -p astro-up-gui

  check-frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: latest
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --dir frontend build

  # Windows: full workspace including GUI. Primary target platform.
  # Runs on crate changes (PRs) and always on push to main.
  check-windows:
    name: Windows Integration
    needs: changes
    runs-on: windows-latest
    if: needs.changes.outputs.crates == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
