name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core_or_cli: ${{ steps.filter.outputs.core_or_cli }}
      gui: ${{ steps.filter.outputs.gui }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core_or_cli:
              - 'crates/astro-up-core/**'
              - 'crates/astro-up-cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            gui:
              - 'crates/astro-up-gui/**'
              - 'crates/astro-up-core/**'
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'

  # Fast path: core + cli only (~30s). Runs on every crate PR.
  check-rust:
    name: Rust Checks
    needs: changes
    if: needs.changes.outputs.core_or_cli == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p astro-up-core -p astro-up-cli --all-targets -- -D warnings
      - run: cargo nextest run -p astro-up-core -p astro-up-cli

  check-frontend:
    name: Frontend Checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --dir frontend build

  # Windows: core + cli only. Skips GUI/Tauri system deps.
  check-windows-cli:
    name: Windows CLI
    needs: changes
    if: needs.changes.outputs.core_or_cli == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - name: Build test fixture catalog
        shell: bash
        run: |
          choco install sqlite -y --no-progress
          sqlite3 crates/astro-up-cli/tests/fixtures/test-catalog.db < crates/astro-up-cli/tests/fixtures/build_catalog.sql
      - run: cargo clippy -p astro-up-core -p astro-up-cli --all-targets -- -D warnings
      - run: cargo nextest run -p astro-up-core -p astro-up-cli

  # Windows: full workspace including GUI. Only on GUI/frontend changes.
  check-windows-gui:
    name: Windows GUI
    needs: changes
    if: needs.changes.outputs.gui == 'true'
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@nextest
      - run: cargo clippy -p astro-up-gui --all-targets -- -D warnings
      - run: cargo nextest run -p astro-up-gui

  # Gate job: always runs, reports single required status.
  # Branch protection should require only "CI OK" — skipped jobs pass through.
  ci-ok:
    name: CI OK
    if: always()
    needs: [check-rust, check-frontend, check-windows-cli, check-windows-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        env:
          RUST: ${{ needs.check-rust.result }}
          FRONTEND: ${{ needs.check-frontend.result }}
          WINDOWS_CLI: ${{ needs.check-windows-cli.result }}
          WINDOWS_GUI: ${{ needs.check-windows-gui.result }}
        run: |
          for result in "$RUST" "$FRONTEND" "$WINDOWS_CLI" "$WINDOWS_GUI"; do
            if [ "$result" = "failure" ]; then
              echo "Job failed: $result"
              exit 1
            fi
          done
          echo "All checks passed, were skipped, or were cancelled by concurrency"
