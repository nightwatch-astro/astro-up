name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gui: ${{ steps.filter.outputs.gui }}
      crates: ${{ steps.filter.outputs.crates }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gui:
              - 'crates/astro-up-gui/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            crates:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # Fast path: core + cli only (~30s). Runs on every PR.
  check-rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p astro-up-core -p astro-up-cli -- -D warnings
      - run: cargo test -p astro-up-core -p astro-up-cli

  # Slow path: gui crate needs Tauri system deps (~3min cached).
  # Only when gui crate or workspace Cargo files change.
  check-gui:
    name: Tauri GUI Check
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.gui == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p astro-up-gui -- -D warnings
      - run: cargo test -p astro-up-gui

  check-frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --dir frontend build

  # Windows: only when crate files change.
  check-windows:
    name: Windows Build
    needs: changes
    runs-on: windows-latest
    if: needs.changes.outputs.crates == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
